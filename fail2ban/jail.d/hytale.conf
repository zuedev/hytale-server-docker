# Fail2Ban jail configuration for Hytale Server

[hytale]
enabled = true
filter = hytale
logpath = /var/log/hytale/*.log
port = 5520
protocol = tcp

# Ban settings
# maxretry: Number of failures before a host gets banned
maxretry = 5

# findtime: Time window in seconds during which maxretry failures must occur
findtime = 600

# bantime: Duration in seconds for the ban (-1 for permanent)
bantime = 3600

# Action to take when banning
# Uses iptables to block the offending IP
action = iptables-allports[name=hytale, protocol=all]

# Optional: Send email notification on ban (requires mail configuration)
# action = iptables-allports[name=hytale, protocol=all]
#          sendmail-whois[name=hytale, dest=admin@example.com]
