# Fail2Ban filter for Hytale Server
# Detects failed authentication attempts and suspicious connection patterns

[Definition]

# Common patterns for failed connections and authentication failures
# Adjust these patterns based on actual Hytale server log output

# Failed authentication attempts
failregex = ^.*\[WARN\].*Failed authentication from <HOST>.*$
            ^.*\[WARN\].*Invalid session from <HOST>.*$
            ^.*\[WARN\].*Connection rejected from <HOST>.*$
            ^.*\[WARN\].*Unauthorized connection attempt from <HOST>.*$
            ^.*\[ERROR\].*Authentication failed.*<HOST>.*$
            ^.*\[WARN\].*Invalid token from <HOST>.*$
            ^.*\[WARN\].*Kicked.*<HOST>.*spam.*$
            ^.*\[WARN\].*Kicked.*<HOST>.*flooding.*$

# Ignore legitimate connections
ignoreregex = 

